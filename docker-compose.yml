# Centralized Vibe Kanban — Docker Compose (remote-only, local npx client model)
#
# Services: postgres + electric (real-time sync) + remote (API) + caddy (TLS).
# Developers connect with: npx @yourorg/vibe-kanban-team  (pointed at PUBLIC_DOMAIN)
# The browser "frontend pod" (sysbox/code-server) is intentionally NOT included —
# it requires the sysbox runtime and is k8s-only. See ../SYSTEM_DESIGN.md §8.
#
# Env values come from .env (copy .env.example -> .env first).

name: vibe-kanban-team

x-restart: &restart
  restart: unless-stopped

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — source of truth. wal_level=logical is REQUIRED for ElectricSQL.
  # The remote service migrations create/manage the electric_sync role.
  # ---------------------------------------------------------------------------
  postgres:
    <<: *restart
    image: postgres:16-alpine
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    environment:
      POSTGRES_USER: remote
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: remote
      # Shared with remote/electric for migration and sync setup.
      ELECTRIC_ROLE_PASSWORD: ${ELECTRIC_ROLE_PASSWORD:?set ELECTRIC_ROLE_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remote -d remote"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  # ---------------------------------------------------------------------------
  # Remote Server — auth, orgs, projects, issues, assignment, API.
  # Runs DB migrations on startup, then serves on :8081. Proxies sync to electric.
  # ---------------------------------------------------------------------------
  remote:
    <<: *restart
    image: ${REMOTE_IMAGE:-vibe-kanban-team-remote}:${IMAGE_TAG:-local}
    # Build from the patched upstream source. Run ./build.sh first (it applies the
    # patch stack), then `docker compose build remote` or `./build.sh` builds this.
    build:
      context: ${VK_DIR:-./vibe-kanban}
      dockerfile: crates/remote/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RUST_LOG: info
      SERVER_LISTEN_ADDR: 0.0.0.0:8081
      SERVER_DATABASE_URL: postgres://remote:${POSTGRES_PASSWORD}@postgres:5432/remote
      VIBEKANBAN_REMOTE_JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      ELECTRIC_ROLE_PASSWORD: ${ELECTRIC_ROLE_PASSWORD}
      ELECTRIC_URL: http://electric:3000
      # Public base URL (override with SERVER_PUBLIC_BASE_URL for local Phase 0 tests):
      SERVER_PUBLIC_BASE_URL: ${SERVER_PUBLIC_BASE_URL:-https://${PUBLIC_DOMAIN:?set PUBLIC_DOMAIN in .env}}
      # Restrict sign-in to your company domain(s), comma-separated. Leave empty to allow all.
      ALLOWED_EMAIL_DOMAINS: ${ALLOWED_EMAIL_DOMAINS:-}
      # --- Pick AT LEAST ONE OAuth provider (set the matching pair in .env) ---
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      ZOHO_OAUTH_CLIENT_ID: ${ZOHO_OAUTH_CLIENT_ID:-}
      ZOHO_OAUTH_CLIENT_SECRET: ${ZOHO_OAUTH_CLIENT_SECRET:-}
      # Optional R2-backed storage for issue/source attachments.
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_REVIEW_ENDPOINT: ${R2_REVIEW_ENDPOINT:-}
      R2_REVIEW_BUCKET: ${R2_REVIEW_BUCKET:-}
      R2_PRESIGN_EXPIRY_SECS: ${R2_PRESIGN_EXPIRY_SECS:-300}
      # Phase 0 local validation fallback when OAuth apps are not configured.
      SELF_HOST_LOCAL_AUTH_EMAIL: ${SELF_HOST_LOCAL_AUTH_EMAIL:-}
      SELF_HOST_LOCAL_AUTH_PASSWORD: ${SELF_HOST_LOCAL_AUTH_PASSWORD:-}
      # Optional (Phase 2): set to send org invitation emails; empty = invite-link sharing only.
      LOOPS_EMAIL_API_KEY: ${LOOPS_EMAIL_API_KEY:-}
    networks: [internal]

  # ---------------------------------------------------------------------------
  # electric-init — mirrors the Helm initContainer: wait until the remote server
  # has finished DB migrations before starting Electric.
  # ---------------------------------------------------------------------------
  electric-init:
    image: busybox:1.36
    depends_on:
      remote:
        condition: service_started
    command:
      - sh
      - -c
      - |
        echo "Waiting for Vibe Kanban remote to finish migrations..."
        until wget -q --spider http://remote:8081/health 2>/dev/null; do
          echo "remote not ready, retrying in 5s..."; sleep 5
        done
        echo "remote ready — migrations complete."
    networks: [internal]
    restart: "no"

  # ---------------------------------------------------------------------------
  # ElectricSQL — streams Postgres changes to clients (real-time sync).
  # Internal-only: clients reach it THROUGH the remote server, not directly.
  # ---------------------------------------------------------------------------
  electric:
    <<: *restart
    image: electricsql/electric:${ELECTRIC_TAG:-1.3.3}
    depends_on:
      postgres:
        condition: service_healthy
      electric-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://electric_sync:${ELECTRIC_ROLE_PASSWORD}@postgres:5432/remote?sslmode=disable
      PG_PROXY_PORT: "65432"
      LOGICAL_PUBLISHER_HOST: electric
      AUTH_MODE: insecure
      ELECTRIC_INSECURE: "true"
      ELECTRIC_MANUAL_TABLE_PUBLISHING: "true"
      ELECTRIC_USAGE_REPORTING: "false"
      ELECTRIC_FEATURE_FLAGS: "allow_subqueries,tagged_subqueries"
    networks: [internal]

  # ---------------------------------------------------------------------------
  # Ingest — OPTIONAL issue-ingestion API. POST /ingest/issues -> auto-create.
  # Enable with: docker compose --profile ingest up -d
  # Requires INGEST_* vars in .env and a service account in the team org.
  # ---------------------------------------------------------------------------
  ingest:
    <<: *restart
    build: ./ingest
    image: vibe-kanban-ingest:local
    profiles: ["ingest"]
    depends_on:
      remote:
        condition: service_healthy
    environment:
      INGEST_PORT: "8090"
      REMOTE_URL: http://remote:8081
      # Optional interpolation (:-) so the base stack never fails to parse when
      # ingest is unused. The sidecar validates these at startup and exits with
      # a clear message if any are missing.
      INGEST_API_KEY: ${INGEST_API_KEY:-}
      INGEST_SVC_EMAIL: ${INGEST_SVC_EMAIL:-}
      INGEST_SVC_PASSWORD: ${INGEST_SVC_PASSWORD:-}
      INGEST_PROJECT_ID: ${INGEST_PROJECT_ID:-}
      INGEST_ORG_ID: ${INGEST_ORG_ID:-}
      INGEST_STATUS_ID: ${INGEST_STATUS_ID:-}
      INGEST_STATUS_NAME: ${INGEST_STATUS_NAME:-todo}
      INGEST_PUBLIC_URL: ${INGEST_PUBLIC_URL:-https://${PUBLIC_DOMAIN}}
      INGEST_DEDUP_FILE: /data/dedup.json
      INGEST_REQUIREMENTS_FILE: ${INGEST_REQUIREMENTS_FILE:-/data/requirements-drafts.json}
      INGEST_MAX_BODY_KB: ${INGEST_MAX_BODY_KB:-2048}
      INGEST_MAX_CHILD_TASKS: ${INGEST_MAX_CHILD_TASKS:-12}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_REVIEW_ENDPOINT: ${R2_REVIEW_ENDPOINT:-}
      R2_REVIEW_BUCKET: ${R2_REVIEW_BUCKET:-}
      R2_REGION: ${R2_REGION:-auto}
      R2_PRESIGN_EXPIRY_SECS: ${R2_PRESIGN_EXPIRY_SECS:-300}
      INGEST_UPLOAD_MAX_MB: ${INGEST_UPLOAD_MAX_MB:-20}
    volumes:
      - ingest_data:/data
    networks: [internal]

  # ---------------------------------------------------------------------------
  # Memory DB — dedicated pgvector store for org memory embeddings and records.
  # Enabled with: docker compose --profile memory up -d
  # ---------------------------------------------------------------------------
  memory-db:
    <<: *restart
    image: pgvector/pgvector:pg16
    profiles: ["memory"]
    environment:
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: ${MEMORY_DB_PASSWORD:-memory-change-me}
      POSTGRES_DB: memory
    volumes:
      - memory_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory -d memory"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  # ---------------------------------------------------------------------------
  # Embedder — Ollama default embedding provider (pluggable via memory service).
  # ---------------------------------------------------------------------------
  embedder:
    <<: *restart
    image: ollama/ollama:latest
    profiles: ["memory"]
    volumes:
      - ollama_data:/root/.ollama
    # Footprint cap (§8): keep the CPU embedder from starving the central stack
    # on the single VM. Tune via .env for higher-volume hosts.
    cpus: ${EMBEDDER_CPUS:-1.5}
    mem_limit: ${EMBEDDER_MEM:-2g}
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [internal]

  # ---------------------------------------------------------------------------
  # Memory sidecar — MCP-first memory service + thin REST under /memory/*.
  # ---------------------------------------------------------------------------
  memory:
    <<: *restart
    build: ./memory
    image: vibe-kanban-memory:local
    profiles: ["memory"]
    depends_on:
      remote:
        condition: service_healthy
      memory-db:
        condition: service_healthy
      embedder:
        condition: service_healthy
    cpus: ${MEMORY_CPUS:-0.5}
    mem_limit: ${MEMORY_MEM:-256m}
    environment:
      MEMORY_PORT: "8091"
      MEMORY_API_KEY: ${MEMORY_API_KEY:-}
      MEMORY_DATABASE_URL: postgres://memory:${MEMORY_DB_PASSWORD:-memory-change-me}@memory-db:5432/memory
      REMOTE_URL: http://remote:8081
      MEMORY_SVC_EMAIL: ${MEMORY_SVC_EMAIL:-${SELF_HOST_LOCAL_AUTH_EMAIL:-}}
      MEMORY_SVC_PASSWORD: ${MEMORY_SVC_PASSWORD:-${SELF_HOST_LOCAL_AUTH_PASSWORD:-}}
      MEMORY_DEFAULT_ORG_ID: ${MEMORY_DEFAULT_ORG_ID:-${INGEST_ORG_ID:-}}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-ollama}
      EMBED_BASE_URL: ${EMBED_BASE_URL:-http://embedder:11434}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      EMBED_DIMENSIONS: ${EMBED_DIMENSIONS:-768}
      EMBED_API_KEY: ${EMBED_API_KEY:-}
      EMBED_BATCH: ${EMBED_BATCH:-32}
      EMBED_MAX_RETRIES: ${EMBED_MAX_RETRIES:-4}
      MEMORY_ALLOWED_ORG_IDS: ${MEMORY_ALLOWED_ORG_IDS:-${MEMORY_DEFAULT_ORG_ID:-${INGEST_ORG_ID:-}}}
      MEMORY_RETENTION_NOISY_DAYS: ${MEMORY_RETENTION_NOISY_DAYS:-90}
      MEMORY_RETENTION_PURGE_DAYS: ${MEMORY_RETENTION_PURGE_DAYS:-30}
      MEMORY_DOC_ROOT: /workspace
      MEMORY_DOC_INCLUDE: ${MEMORY_DOC_INCLUDE:-HANDOFF.md,GO_LIVE.md,SYSTEM_DESIGN.md,EXECUTION_PLAN.md,DEPLOYMENT_README.md,DEVELOPER_ONBOARDING.md,REQUIREMENTS_AND_PLAN.md}
    volumes:
      - ./:/workspace:ro
    networks: [internal]

  # ---------------------------------------------------------------------------
  # Caddy — TLS termination + reverse proxy. Automatic Let's Encrypt certs.
  # Only the remote API is exposed publicly; electric stays internal.
  # ---------------------------------------------------------------------------
  caddy:
    <<: *restart
    image: caddy:2
    depends_on:
      - remote
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env}
    volumes:
      - ./${CADDYFILE_PATH:-Caddyfile}:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [internal]

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  ingest_data:
  memory_db_data:
  ollama_data:

networks:
  internal:
    driver: bridge
