{{- if .Values.frontend.enabled }}
{{- $proxyDomain := .Values.frontend.codeServer.proxyDomain | default (include "vibe-kanban-team.frontend.proxyDomain" .) }}
{{- $codeServerHost := include "vibe-kanban-team.codeServer.host" . }}
{{- $sharedApiBase := .Values.frontend.app.sharedApiBase | default (include "vibe-kanban-team.remote.publicBaseUrl" .) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vibe-kanban-team.frontend.fullname" . }}-init
  labels:
    {{- include "vibe-kanban-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
data:
  init.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    # Create coder user if it doesn't exist
    if ! id -u coder >/dev/null 2>&1; then
      echo "Creating coder user..."
      useradd coder \
        --create-home \
        --shell=/bin/bash \
        --uid=1000 \
        --user-group
      echo "coder ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers.d/nopasswd
    fi

    # Copy skel files to /home/coder if missing (PVC mount prevents useradd from copying)
    if [ ! -f /home/coder/.bashrc ]; then
      echo "Populating /home/coder from /etc/skel..."
      cp -rn /etc/skel/. /home/coder/
      chown -R coder:coder /home/coder
    fi

    # Resolve full path for npx/node (nvm installs to non-standard location)
    NPX_PATH=$(which npx 2>/dev/null || echo "/usr/local/share/nvm/current/bin/npx")
    NVM_BIN=$(dirname "$NPX_PATH")
    BREW_BIN="/home/linuxbrew/.linuxbrew/bin"
    LOCAL_BIN="/home/coder/.local/bin"
    FULL_PATH="$LOCAL_BIN:$NVM_BIN:$BREW_BIN:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

    # Cladup drives Claude Code through tmux and a Python shim.
    AI_RUNTIME_PACKAGES=()
    command -v tmux >/dev/null 2>&1 || AI_RUNTIME_PACKAGES+=(tmux)
    command -v python3 >/dev/null 2>&1 || AI_RUNTIME_PACKAGES+=(python3)
    if [ "${#AI_RUNTIME_PACKAGES[@]}" -gt 0 ]; then
      echo "Installing AI runtime packages: ${AI_RUNTIME_PACKAGES[*]}"
      apt-get update -qq
      DEBIAN_FRONTEND=noninteractive apt-get install -y -qq "${AI_RUNTIME_PACKAGES[@]}" >/dev/null
    fi

    # =========================================================================
    # Install Claude Code and Codex (post-boot via systemd, not blocking init)
    # =========================================================================
    cat > /usr/local/bin/install-ai-tools.sh << 'INSTALLEOF'
    #!/usr/bin/env bash
    set -euo pipefail
    export PATH="/home/coder/.local/bin:/usr/local/share/nvm/current/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    export HOME="/home/coder"
    cd "$HOME"

    # Install Claude Code via official installer
    if [ ! -f "$HOME/.local/bin/claude" ]; then
      echo "Installing Claude Code..."
      curl -fsSL https://claude.ai/install.sh | bash -s stable 2>&1 || true
    fi

    # Install Codex via npm
    if ! command -v codex &>/dev/null; then
      echo "Installing Codex..."
      npm install -g @openai/codex@0.133.0 2>&1 || true
    fi

    # Install OpenCode when ZAI_API_KEY is provided
    if [ -n "${ZAI_API_KEY:-}" ]; then
      echo "ZAI_API_KEY detected, installing OpenCode..."
      if ! command -v opencode &>/dev/null; then
        curl -fsSL https://opencode.ai/install | bash -s -- --version 1.15.10 2>&1 || true
      fi

      # Configure OpenCode auth for zai-coding-plan provider
      OPENCODE_AUTH_DIR="$HOME/.local/share/opencode"
      OPENCODE_AUTH_FILE="$OPENCODE_AUTH_DIR/auth.json"
      if [ ! -f "$OPENCODE_AUTH_FILE" ]; then
        echo "Configuring OpenCode auth for zai-coding-plan..."
        mkdir -p "$OPENCODE_AUTH_DIR"
        cat > "$OPENCODE_AUTH_FILE" << AUTHJSONEOF
    {
      "zai-coding-plan": {
        "type": "api",
        "key": "${ZAI_API_KEY}"
      }
    }
    AUTHJSONEOF
        chmod 600 "$OPENCODE_AUTH_FILE"
        chown -R coder:coder "$OPENCODE_AUTH_DIR"
      fi
    fi
    INSTALLEOF
    chmod +x /usr/local/bin/install-ai-tools.sh

    cat > /etc/systemd/system/install-ai-tools.service << EOF
    [Unit]
    Description=Install Claude Code, Codex, and OpenCode
    After=network-online.target
    Wants=network-online.target

    [Service]
    Type=oneshot
    User=coder
    ExecStart=/usr/local/bin/install-ai-tools.sh
    RemainAfterExit=yes
    TimeoutStartSec=300

    [Install]
    WantedBy=multi-user.target
    EOF
    ln -sf /etc/systemd/system/install-ai-tools.service /etc/systemd/system/multi-user.target.wants/install-ai-tools.service

    # =========================================================================
    # Configure Claude Code onboarding bypass
    # =========================================================================
    CLAUDE_JSON="/home/coder/.claude.json"
    if [ ! -f "$CLAUDE_JSON" ] || ! grep -q '"hasCompletedOnboarding"' "$CLAUDE_JSON" 2>/dev/null; then
      cat > "$CLAUDE_JSON" << 'CJEOF'
    {
      "autoUpdaterStatus": "disabled",
      "bypassPermissionsModeAccepted": true,
      "hasAcknowledgedCostThreshold": true,
      "hasCompletedOnboarding": true
    }
    CJEOF
      chown coder:coder "$CLAUDE_JSON"
    fi

    {{- if $proxyDomain }}
    # =========================================================================
    # port-url script + AI agent skills
    # =========================================================================

    # Shell script: port-url <port> → returns the public URL
    cat > /usr/local/bin/port-url << 'PUEOF'
    #!/usr/bin/env bash
    if [ -z "$1" ]; then echo "Usage: port-url <port>" >&2; exit 1; fi
    if [ -z "$VSCODE_PROXY_URI" ]; then echo "Error: VSCODE_PROXY_URI is not set" >&2; exit 1; fi
    echo "${VSCODE_PROXY_URI//\{\{port\}\}/$1}"
    PUEOF
    chmod 755 /usr/local/bin/port-url

    # AI agent skill — written directly to both Claude Code and Codex dirs
    for SKILL_DIR in \
      /home/coder/.claude/skills/expose-port \
      /home/coder/.agents/skills/expose-port; do
      mkdir -p "$SKILL_DIR"
      cat > "$SKILL_DIR/SKILL.md" << 'SKILLEOF'
    ---
    name: expose-port
    description: >
      When running a dev server or app on a port, use `port-url <port>` to get
      the browser-accessible URL. Always bind to 0.0.0.0 and configure the
      framework to allow the proxy host.
    ---
    # Exposing Ports
    This is a remote container. `localhost` is NOT accessible to the user.
    ## Get the public URL
    Run `port-url <port>` to get the URL the user can open:
    ```
    $ port-url 5173
    https://5173-code.vk.community.example.com/
    ```
    Always present this URL to the user — never `localhost` or `127.0.0.1`.
    ## Requirements
    1. Bind to `0.0.0.0` (not `127.0.0.1`)
    2. Allow the proxy host in the framework config:
       - **Vite**: `server: { host: "0.0.0.0", allowedHosts: "all" }` in vite.config
       - **Next.js**: `next dev -H 0.0.0.0`
       - **CRA**: `HOST=0.0.0.0 DANGEROUSLY_DISABLE_HOST_CHECK=true react-scripts start`
       - **Django**: `ALLOWED_HOSTS = ["*"]`, run with `0.0.0.0`
       - **Flask**: `flask run --host=0.0.0.0`
       - **Rails**: `rails server -b 0.0.0.0`
       - **Other**: bind `0.0.0.0`, add proxy domain to host allowlist if needed
    SKILLEOF
    done
    # AI agent skill — glab (GitLab CLI for merge requests)
    for SKILL_DIR in \
      /home/coder/.claude/skills/glab \
      /home/coder/.agents/skills/glab; do
      mkdir -p "$SKILL_DIR"
      cat > "$SKILL_DIR/SKILL.md" << 'SKILLEOF'
    ---
    name: glab
    description: >
      Use when the user asks to create a merge request, submit their work,
      or manage GitLab MRs. Uses glab CLI with squash and author signature.
    ---
    # GitLab Merge Requests via glab CLI

    The glab CLI is authenticated as a shared service account. Every MR **must**:
    - Assign to the real author: `--assignee $GIT_COMMITTER_EMAIL`
    - End the description with an author signature and model identification:
      `Authored by: $GIT_COMMITTER_NAME <$GIT_COMMITTER_EMAIL>`
      e.g. `🤖 Generated with Claude Code Opus 4.6 (1M context) with high effort`

    Use `glab mr create --push --squash-before-merge --remove-source-branch` to
    create MRs. Follow Conventional Commits for titles. Include a Summary and
    Test Plan section in the description.

    Do **not** merge automatically. Only merge if the user explicitly asks.
    When merging: `glab mr merge <id> --squash --remove-source-branch --yes`
    (use `--auto-merge` if pipelines are pending).
    SKILLEOF
    done
    chown -R coder:coder /home/coder/.claude /home/coder/.agents
    {{- end }}

    # Propagate container env vars to systemd services and coder user shells.
    # Container env vars don't automatically reach systemd services or login shells.
    # EnvironmentFile for systemd services:
    touch /etc/default/vibe-kanban-env
    if [ -n "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
      echo "CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}" >> /etc/default/vibe-kanban-env
    fi
    if [ -n "${ZAI_API_KEY:-}" ]; then
      echo "ZAI_API_KEY=${ZAI_API_KEY}" >> /etc/default/vibe-kanban-env
    fi
    write_env_file_var() {
      local name="$1"
      local value="${!name:-}"
      if [ -n "$value" ]; then
        printf '%s=%q\n' "$name" "$value" >> /etc/default/vibe-kanban-env
      fi
    }
    for VK_ENV_NAME in \
      VIBE_KANBAN_EDITOR_TYPE \
      VIBE_KANBAN_EDITOR \
      VIBE_KANBAN_CODE_SERVER_URL \
      VIBE_KANBAN_BROWSER_SCOPED_AUTH \
      CODE_SERVER_URL \
      VIBE_KANBAN_BYPASS_ONBOARDING; do
      write_env_file_var "$VK_ENV_NAME"
    done
    if [ -z "${VIBE_KANBAN_BROWSER_SCOPED_AUTH:-}" ]; then
      if [ "{{ .Values.frontend.app.browserScopedAuth | toString | lower }}" = "false" ]; then
        printf '%s=%q\n' "VIBE_KANBAN_BROWSER_SCOPED_AUTH" "false" >> /etc/default/vibe-kanban-env
      fi
    fi
    {{- if and .Values.frontend.codeServer.enabled $codeServerHost }}
    if [ -z "${VIBE_KANBAN_EDITOR_TYPE:-}" ] && [ -z "${VIBE_KANBAN_EDITOR:-}" ]; then
      printf '%s=%q\n' "VIBE_KANBAN_EDITOR_TYPE" "CODE_SERVER" >> /etc/default/vibe-kanban-env
    fi
    if [ -z "${VIBE_KANBAN_CODE_SERVER_URL:-}" ] && [ -z "${CODE_SERVER_URL:-}" ]; then
      printf '%s=%q\n' "VIBE_KANBAN_CODE_SERVER_URL" "https://{{ $codeServerHost }}/" >> /etc/default/vibe-kanban-env
    fi
    {{- end }}
    {{- if .Values.frontend.app.bypassOnboarding }}
    if [ -z "${VIBE_KANBAN_BYPASS_ONBOARDING:-}" ]; then
      printf '%s=%q\n' "VIBE_KANBAN_BYPASS_ONBOARDING" "true" >> /etc/default/vibe-kanban-env
    fi
    {{- end }}
    {{- if $proxyDomain }}
    echo "VSCODE_PROXY_URI=https://{{ $proxyDomain }}/" >> /etc/default/vibe-kanban-env
    {{- end }}
    chmod 600 /etc/default/vibe-kanban-env

    # Shell exports for coder user (code-server terminal):
    # These env vars don't propagate from container → systemd → login shells,
    # so we write them to .bashrc.d/ files that get sourced in interactive shells.
    for RC_DIR in /home/coder/.bashrc.d /home/coder/.zshrc.d; do
      mkdir -p "$RC_DIR"
      : > "$RC_DIR/80-container-env.sh"
      if [ -n "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
        echo "export CLAUDE_CODE_OAUTH_TOKEN=\"${CLAUDE_CODE_OAUTH_TOKEN}\"" >> "$RC_DIR/80-container-env.sh"
      fi
      if [ -n "${ZAI_API_KEY:-}" ]; then
        echo "export ZAI_API_KEY=\"${ZAI_API_KEY}\"" >> "$RC_DIR/80-container-env.sh"
      fi
      write_shell_export() {
        local name="$1"
        local value="${!name:-}"
        if [ -n "$value" ]; then
          printf 'export %s=%q\n' "$name" "$value" >> "$RC_DIR/80-container-env.sh"
        fi
      }
      for VK_ENV_NAME in \
        VIBE_KANBAN_EDITOR_TYPE \
        VIBE_KANBAN_EDITOR \
        VIBE_KANBAN_CODE_SERVER_URL \
        VIBE_KANBAN_BROWSER_SCOPED_AUTH \
        CODE_SERVER_URL \
        VIBE_KANBAN_BYPASS_ONBOARDING; do
        write_shell_export "$VK_ENV_NAME"
      done
      if [ -z "${VIBE_KANBAN_BROWSER_SCOPED_AUTH:-}" ]; then
        if [ "{{ .Values.frontend.app.browserScopedAuth | toString | lower }}" = "false" ]; then
          printf '%s\n' 'export VIBE_KANBAN_BROWSER_SCOPED_AUTH="false"' >> "$RC_DIR/80-container-env.sh"
        fi
      fi
      {{- if and .Values.frontend.codeServer.enabled $codeServerHost }}
      if [ -z "${VIBE_KANBAN_EDITOR_TYPE:-}" ] && [ -z "${VIBE_KANBAN_EDITOR:-}" ]; then
        printf '%s\n' 'export VIBE_KANBAN_EDITOR_TYPE="CODE_SERVER"' >> "$RC_DIR/80-container-env.sh"
      fi
      if [ -z "${VIBE_KANBAN_CODE_SERVER_URL:-}" ] && [ -z "${CODE_SERVER_URL:-}" ]; then
        printf '%s\n' 'export VIBE_KANBAN_CODE_SERVER_URL="https://{{ $codeServerHost }}/"' >> "$RC_DIR/80-container-env.sh"
      fi
      {{- end }}
      {{- if .Values.frontend.app.bypassOnboarding }}
      if [ -z "${VIBE_KANBAN_BYPASS_ONBOARDING:-}" ]; then
        printf '%s\n' 'export VIBE_KANBAN_BYPASS_ONBOARDING="true"' >> "$RC_DIR/80-container-env.sh"
      fi
      {{- end }}
      {{- if $proxyDomain }}
      echo 'export VSCODE_PROXY_URI="https://{{ $proxyDomain }}/"' >> "$RC_DIR/80-container-env.sh"
      {{- end }}
      chown -R coder:coder "$RC_DIR"
    done
    # Shell PATH + aliases for coder user
    for RC_DIR in /home/coder/.bashrc.d /home/coder/.zshrc.d; do
      mkdir -p "$RC_DIR"
      cat > "$RC_DIR/90-ai-tools.sh" << 'ALIASEOF'
    # Claude Code lives in ~/.local/bin
    export PATH="$HOME/.local/bin:$PATH"
    alias cai="claude --dangerously-skip-permissions"
    alias coai="codex --dangerously-bypass-approvals-and-sandbox"
    ALIASEOF
      chown -R coder:coder "$RC_DIR"
    done

    # =========================================================================
    # Build code-server arguments
    # =========================================================================
    CS_ARGS="--auth none --port {{ .Values.frontend.codeServer.port }} --bind-addr 0.0.0.0:{{ .Values.frontend.codeServer.port }}"
    {{- if $proxyDomain }}
    CS_ARGS="$CS_ARGS --proxy-domain {{ $proxyDomain }}"
    {{- end }}

    # =========================================================================
    # Create systemd services
    # =========================================================================

    # code-server service
    cat > /etc/systemd/system/code-server.service << EOF
    [Unit]
    Description=code-server
    After=network.target

    [Service]
    Type=simple
    User=coder
    Environment=PATH=$FULL_PATH
    ExecStart=/opt/code-server/bin/code-server $CS_ARGS
    Restart=always
    RestartSec=5

    [Install]
    WantedBy=multi-user.target
    EOF

    # vibe-kanban frontend service
    # HOST=0.0.0.0 is required — the binary defaults to 127.0.0.1
    cat > /etc/systemd/system/vibe-kanban.service << EOF
    [Unit]
    Description=Vibe Kanban Frontend
    After=network.target

    [Service]
    Type=simple
    User=coder
    WorkingDirectory={{ .Values.frontend.app.workingDirectory }}
    Environment=HOST=0.0.0.0
    Environment=PORT={{ .Values.frontend.app.port }}
    {{- if $sharedApiBase }}
    Environment=VK_SHARED_API_BASE={{ $sharedApiBase }}
    {{- end }}
    Environment=PATH=$NVM_BIN:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    EnvironmentFile=-/etc/default/vibe-kanban-env
    ExecStart=$NPX_PATH --yes vibe-kanban-team
    Restart=always
    RestartSec=5

    [Install]
    WantedBy=multi-user.target
    EOF

    # Claude Code auto-auth service (runs once to inject token from env)
    # The CLAUDE_CODE_OAUTH_TOKEN env var is injected into the container from a K8s secret
    if [ -n "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
      cat > /etc/systemd/system/claude-code-auth.service << AUTHEOF
    [Unit]
    Description=Claude Code OAuth Token Setup
    After=network.target
    ConditionPathExists=!/home/coder/.claude/.credentials.json

    [Service]
    Type=oneshot
    User=coder
    Environment=PATH=$FULL_PATH
    Environment=CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
    ExecStart=/bin/bash -lc 'claude auth login --oauth-token 2>/dev/null || true'
    RemainAfterExit=yes

    [Install]
    WantedBy=multi-user.target
    AUTHEOF
      ln -sf /etc/systemd/system/claude-code-auth.service /etc/systemd/system/multi-user.target.wants/claude-code-auth.service
    fi

    {{- if .Values.frontend.vpn.enabled }}
    # =========================================================================
    # WireGuard VPN + Kill Switch
    # =========================================================================
    # Reads config from K8s secret mounted at /etc/wireguard-secret/
    # All outbound forced through wg0. RFC1918 blocked on wg0 (no LAN via VPN).
    # If VPN drops, kill switch blocks all outbound. Inbound to 3000/8080 unaffected.

    cat > /usr/local/bin/vpn-setup.sh << 'VPNEOF'
    #!/usr/bin/env bash
    set -euo pipefail

    SECRET_DIR="/etc/wireguard-secret"

    # Read config from mounted secret
    WG_PRIVATE_KEY=$(cat "$SECRET_DIR/private-key")
    WG_PEER_PUBLIC_KEY=$(cat "$SECRET_DIR/peer-public-key")
    WG_ENDPOINT=$(cat "$SECRET_DIR/endpoint")
    WG_ENDPOINT_PORT=$(cat "$SECRET_DIR/endpoint-port")
    WG_ADDRESS=$(cat "$SECRET_DIR/address")
    WG_PRESHARED_KEY=$(cat "$SECRET_DIR/preshared-key" 2>/dev/null || echo "")
    WG_DNS=$(cat "$SECRET_DIR/dns" 2>/dev/null || echo "")

    # Fail hard if credentials are missing — never skip VPN
    if [ -z "$WG_PRIVATE_KEY" ] || [ "$WG_PRIVATE_KEY" = "REPLACE_WITH_YOUR_PRIVATE_KEY" ]; then
      echo "FATAL: VPN credentials missing or placeholder. Cannot start without VPN."
      exit 1
    fi

    # Resolve endpoint hostname to IP (iptables needs IP)
    WG_ENDPOINT_IP=$(getent hosts "$WG_ENDPOINT" | awk '{print $1}' | head -1)
    if [ -z "$WG_ENDPOINT_IP" ]; then
      WG_ENDPOINT_IP="$WG_ENDPOINT"
    fi

    # Install wireguard-tools if missing
    if ! command -v wg &>/dev/null; then
      apt-get update -qq && apt-get install -y -qq wireguard-tools >/dev/null 2>&1
    fi

    # Generate WireGuard config
    mkdir -p /etc/wireguard
    cat > /etc/wireguard/wg0.conf << WGEOF
    [Interface]
    PrivateKey = $WG_PRIVATE_KEY
    Address = $WG_ADDRESS
    WGEOF

    # Add preshared key if provided
    if [ -n "$WG_PRESHARED_KEY" ]; then
      cat >> /etc/wireguard/wg0.conf << WGEOF

    [Peer]
    PublicKey = $WG_PEER_PUBLIC_KEY
    PresharedKey = $WG_PRESHARED_KEY
    Endpoint = ${WG_ENDPOINT}:${WG_ENDPOINT_PORT}
    AllowedIPs = 0.0.0.0/0, ::/0
    PersistentKeepalive = 25
    WGEOF
    else
      cat >> /etc/wireguard/wg0.conf << WGEOF

    [Peer]
    PublicKey = $WG_PEER_PUBLIC_KEY
    Endpoint = ${WG_ENDPOINT}:${WG_ENDPOINT_PORT}
    AllowedIPs = 0.0.0.0/0, ::/0
    PersistentKeepalive = 25
    WGEOF
    fi

    chmod 600 /etc/wireguard/wg0.conf

    # Bring up WireGuard
    wg-quick up wg0

    # =========================================================================
    # Firewall (kill switch + RFC1918 block)
    # =========================================================================

    # Flush existing rules
    iptables -F
    iptables -X

    # Default policies
    iptables -P INPUT DROP
    iptables -P FORWARD DROP
    iptables -P OUTPUT DROP

    # --- Loopback ---
    iptables -A INPUT -i lo -j ACCEPT
    iptables -A OUTPUT -o lo -j ACCEPT

    # --- Allow established/related (return traffic) ---
    iptables -A INPUT -m state --state ESTABLISHED,RELATED -j ACCEPT
    iptables -A OUTPUT -m state --state ESTABLISHED,RELATED -j ACCEPT

    # --- Inbound: allow ingress traffic to code-server and frontend ---
    iptables -A INPUT -i eth0 -p tcp --dport {{ .Values.frontend.app.port }} -j ACCEPT
    iptables -A INPUT -i eth0 -p tcp --dport {{ .Values.frontend.codeServer.port }} -j ACCEPT

    # --- Outbound: allow WireGuard handshake to endpoint via eth0 ---
    iptables -A OUTPUT -o eth0 -p udp -d "$WG_ENDPOINT_IP" --dport "$WG_ENDPOINT_PORT" -j ACCEPT

    # --- Outbound: block RFC1918 on wg0 (no LAN access through VPN) ---
    iptables -A OUTPUT -o wg0 -d 10.0.0.0/8 -j DROP
    iptables -A OUTPUT -o wg0 -d 172.16.0.0/12 -j DROP
    iptables -A OUTPUT -o wg0 -d 192.168.0.0/16 -j DROP
    iptables -A OUTPUT -o wg0 -d 169.254.0.0/16 -j DROP

    # --- Outbound: allow everything through wg0 (VPN tunnel) ---
    iptables -A OUTPUT -o wg0 -j ACCEPT

    # --- Everything else outbound: DROP (kill switch) ---
    # (default OUTPUT policy is DROP, so this is implicit)

    # =========================================================================
    # DNS: force through VPN
    # =========================================================================
    DNS_SERVER="${WG_DNS:-1.1.1.1}"
    cat > /etc/resolv.conf << DNSEOF
    nameserver $DNS_SERVER
    DNSEOF

    echo "VPN: WireGuard tunnel up, firewall active, DNS via $DNS_SERVER"
    echo "VPN: Endpoint $WG_ENDPOINT_IP:$WG_ENDPOINT_PORT"
    echo "VPN: Address $WG_ADDRESS"
    VPNEOF
    chmod +x /usr/local/bin/vpn-setup.sh

    # Teardown script
    cat > /usr/local/bin/vpn-teardown.sh << 'VPNTDEOF'
    #!/usr/bin/env bash
    wg-quick down wg0 2>/dev/null || true
    iptables -F 2>/dev/null || true
    iptables -P INPUT ACCEPT 2>/dev/null || true
    iptables -P OUTPUT ACCEPT 2>/dev/null || true
    iptables -P FORWARD ACCEPT 2>/dev/null || true
    VPNTDEOF
    chmod +x /usr/local/bin/vpn-teardown.sh

    cat > /etc/systemd/system/wireguard-vpn.service << EOF
    [Unit]
    Description=WireGuard VPN + Kill Switch
    After=network-online.target
    Wants=network-online.target
    Before=vibe-kanban.service code-server.service install-ai-tools.service

    [Service]
    Type=oneshot
    ExecStart=/usr/local/bin/vpn-setup.sh
    ExecStop=/usr/local/bin/vpn-teardown.sh
    RemainAfterExit=yes

    [Install]
    WantedBy=multi-user.target
    EOF
    ln -sf /etc/systemd/system/wireguard-vpn.service /etc/systemd/system/multi-user.target.wants/wireguard-vpn.service

    # Make vibe-kanban and code-server wait for VPN
    mkdir -p /etc/systemd/system/vibe-kanban.service.d
    cat > /etc/systemd/system/vibe-kanban.service.d/vpn.conf << EOF
    [Unit]
    After=wireguard-vpn.service
    Requires=wireguard-vpn.service
    EOF

    mkdir -p /etc/systemd/system/code-server.service.d
    cat > /etc/systemd/system/code-server.service.d/vpn.conf << EOF
    [Unit]
    After=wireguard-vpn.service
    Requires=wireguard-vpn.service
    EOF

    mkdir -p /etc/systemd/system/install-ai-tools.service.d
    cat > /etc/systemd/system/install-ai-tools.service.d/vpn.conf << EOF
    [Unit]
    After=wireguard-vpn.service
    Requires=wireguard-vpn.service
    EOF

    # =========================================================================
    # Lock down network tools (prevent VPN bypass by coder user)
    # =========================================================================
    # Root-only execute on all network management binaries
    for BIN in \
      /usr/sbin/iptables /usr/sbin/iptables-save /usr/sbin/iptables-restore \
      /usr/sbin/ip6tables /usr/sbin/ip6tables-save /usr/sbin/ip6tables-restore \
      /sbin/iptables /sbin/ip6tables \
      /sbin/ip /usr/sbin/ip \
      /usr/bin/wg /usr/bin/wg-quick /sbin/wg-quick \
      /usr/sbin/nft /sbin/nft \
      /usr/bin/nsenter /usr/bin/unshare \
      /usr/local/bin/vpn-setup.sh /usr/local/bin/vpn-teardown.sh; do
      [ -e "$BIN" ] && chmod 700 "$BIN"
    done

    # Restrict sudo: allow everything EXCEPT network and VPN commands
    cat > /etc/sudoers.d/vpn-lockdown << 'SUDOEOF'
    # Block network tools even via sudo
    coder ALL=(ALL) NOPASSWD: ALL, \
      !/usr/sbin/iptables, !/usr/sbin/iptables-save, !/usr/sbin/iptables-restore, \
      !/usr/sbin/ip6tables, !/usr/sbin/ip6tables-save, !/usr/sbin/ip6tables-restore, \
      !/sbin/iptables, !/sbin/ip6tables, \
      !/sbin/ip, !/usr/sbin/ip, \
      !/usr/bin/wg, !/usr/bin/wg-quick, !/sbin/wg-quick, \
      !/usr/sbin/nft, !/sbin/nft, \
      !/usr/bin/nsenter, !/usr/bin/unshare, \
      !/usr/local/bin/vpn-setup.sh, !/usr/local/bin/vpn-teardown.sh
    SUDOEOF
    chmod 440 /etc/sudoers.d/vpn-lockdown
    {{- end }}

    # =========================================================================
    # Docker prune (daily cleanup of unused images and build cache)
    # =========================================================================
    cat > /usr/local/bin/docker-prune.sh << 'DPEOF'
    #!/usr/bin/env bash
    set -euo pipefail
    if ! command -v docker &>/dev/null; then echo "docker not found"; exit 1; fi
    if ! docker info &>/dev/null; then echo "docker daemon not running"; exit 1; fi
    echo "$(date): Running docker system prune..."
    docker system prune -f 2>&1
    echo "$(date): Docker prune complete."
    DPEOF
    chmod +x /usr/local/bin/docker-prune.sh

    cat > /etc/systemd/system/docker-prune.service << EOF
    [Unit]
    Description=Docker system prune
    Requires=docker.service
    After=docker.service

    [Service]
    Type=oneshot
    ExecStart=/usr/local/bin/docker-prune.sh
    EOF

    cat > /etc/systemd/system/docker-prune.timer << EOF
    [Unit]
    Description=Daily Docker system prune

    [Timer]
    OnCalendar=daily
    Persistent=true
    RandomizedDelaySec=300

    [Install]
    WantedBy=timers.target
    EOF
    ln -sf /etc/systemd/system/docker-prune.timer /etc/systemd/system/timers.target.wants/docker-prune.timer

    {{- if .Values.frontend.dockerCache.enabled }}
    # =========================================================================
    # Docker registry cache (Zot pull-through proxy)
    # =========================================================================
    DOCKER_MIRROR_URL="{{ .Values.frontend.dockerCache.registryMirrorUrl }}"
    MIRROR_HOST="${DOCKER_MIRROR_URL#*://}"  # strip scheme for insecure-registries

    if [ -f /etc/docker/daemon.json ]; then
      which jq > /dev/null 2>&1 || (apt-get update -qq && apt-get install -y -qq jq > /dev/null 2>&1)
      cat > /tmp/docker_cache_settings.json << DCEOF
    {
      "registry-mirrors": ["${DOCKER_MIRROR_URL}"],
      "insecure-registries": ["${MIRROR_HOST}"]
    }
    DCEOF
      jq -s '.[0] * .[1]' /etc/docker/daemon.json /tmp/docker_cache_settings.json > /tmp/daemon_merged.json
      cp /etc/docker/daemon.json /etc/docker/daemon.json.bak
      mv /tmp/daemon_merged.json /etc/docker/daemon.json
      rm -f /tmp/docker_cache_settings.json
    else
      mkdir -p /etc/docker
      cat > /etc/docker/daemon.json << DCEOF
    {
      "registry-mirrors": ["${DOCKER_MIRROR_URL}"],
      "insecure-registries": ["${MIRROR_HOST}"]
    }
    DCEOF
    fi
    echo "Docker configured with registry cache: ${DOCKER_MIRROR_URL}"
    {{- end }}

    # Enable services by creating symlinks directly
    # (systemctl enable doesn't work before systemd is PID 1)
    ln -sf /etc/systemd/system/code-server.service /etc/systemd/system/multi-user.target.wants/code-server.service
    ln -sf /etc/systemd/system/vibe-kanban.service /etc/systemd/system/multi-user.target.wants/vibe-kanban.service

    exec /sbin/init
{{- end }}
