# Default values for vibe-kanban-team
# This is a YAML-formatted file.

# =============================================================================
# Vibe Kanban Server Configuration
# =============================================================================

replicaCount: 1

global:
  # Public app domain, e.g. vk.example.com or vk-gibberish.example.com.
  # When frontend.enabled=true, the frontend uses this exact domain and
  # other services derive as subdomains like remote.<domain> and code.<domain>.
  # When frontend.enabled=false, the remote server uses this domain directly.
  domain: ""
  ingressClassName: ""
  ingress:
    annotations: {}
  tls:
    enabled: false
    clusterIssuer: ""
    secretNamePrefix: ""

image:
  repository: ghcr.io/iamriajul/vibe-kanban-team-remote
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to chart appVersion (latest in repo; release packages set appVersion to version)

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 10001

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

service:
  type: ClusterIP
  port: 8081

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# =============================================================================
# PostgreSQL via CloudNativePG (Built-in Database)
# =============================================================================
# Deploys a managed PostgreSQL cluster via CNPG. Requires the operator:
#   kubectl apply --server-side -f \
#     https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/main/releases/cnpg-1.25.0.yaml
#
# When enabled, all secrets (database URL, JWT, Electric sync password) are
# auto-generated — no pre-existing secrets or database setup required.
# Set postgres.enabled=false and configure config.existingSecrets to bring
# your own PostgreSQL (RDS, CloudSQL, existing CNPG, etc.).
# =============================================================================

postgres:
  enabled: true
  instances: 1
  database: remote
  storage:
    size: 8Gi
    storageClass: ""

  # ---------------------------------------------------------------------------
  # Backup via CNPG built-in Barman (optional)
  # ---------------------------------------------------------------------------
  # Uses CNPG's native barmanObjectStore — no extra CRDs or plugins needed.
  #
  # Create a secret with your object-store credentials:
  #   kubectl create secret generic backup-creds -n <namespace> \
  #     --from-literal=ACCESS_KEY_ID='...' \
  #     --from-literal=ACCESS_SECRET_KEY='...'
  #
  # Then enable backup:
  #   postgres.backup.enabled: true
  #   postgres.backup.destinationPath: "s3://my-bucket/backups/"
  #   postgres.backup.secretName: "backup-creds"
  # ---------------------------------------------------------------------------
  backup:
    enabled: false

    # S3/GCS/Azure destination (required when enabled)
    #   S3:    s3://bucket/path/
    #   GCS:   gs://bucket/path/
    #   Azure: https://account.blob.core.windows.net/container/path/
    destinationPath: ""

    # Custom S3 endpoint for MinIO or S3-compatible stores (optional)
    endpointURL: ""

    # Kubernetes secret with object-store credentials
    # For S3: keys ACCESS_KEY_ID and ACCESS_SECRET_KEY
    # For GCS: key APPLICATION_CREDENTIALS (JSON service account)
    # For Azure: keys AZURE_STORAGE_ACCOUNT and AZURE_STORAGE_KEY (or SAS token)
    secretName: ""
    accessKeyIdKey: ACCESS_KEY_ID
    secretAccessKeyKey: ACCESS_SECRET_KEY

    # WAL archiving compression (gzip, bzip2, snappy, lz4, zstd, or "")
    walCompression: gzip

    # Retention policy — how long to keep backups (e.g. "30d", "90d")
    retentionPolicy: "30d"

    # Scheduled backup cron (6 fields: sec min hour dom month dow)
    # Default: daily at midnight
    schedule: "0 0 0 * * *"

    # Take an immediate backup when the schedule is first created
    immediate: true

    # Owner reference for backup objects: "self", "cluster", or "none"
    backupOwnerReference: self

config:
  existingSecrets:
    database:
      name: ""
      urlKey: url
      electricUrlKey: electric-url
    app:
      name: ""
      jwtSecretKey: jwt-secret
      electricRolePasswordKey: electric-role-password
    oauth:
      name: ""
      # Set key to non-empty to enable a provider (must exist in the secret).
      # Leave empty ("") to disable a provider.
      githubClientIdKey: ""
      githubClientSecretKey: github-client-secret
      googleClientIdKey: ""
      googleClientSecretKey: google-client-secret
      zohoClientIdKey: ""
      zohoClientSecretKey: zoho-client-secret
      # Optional: override Zoho accounts URL (e.g. https://accounts.zoho.eu)
      # Set via extraEnv: [{name: ZOHO_ACCOUNTS_URL, value: "..."}]

  # Restrict OAuth login to specific email domains (comma-separated).
  # When set, only users whose email ends with one of these domains can sign in.
  # Leave empty to allow all domains.
  # Example: "company.com,subsidiary.com"
  allowedEmailDomains: ""

# =============================================================================
# Environment Variables
# =============================================================================
# When postgres.enabled=true, all required secrets are auto-generated.
# Use config.existingSecrets when postgres.enabled=false (bring your own DB).
# Use env / relay.env / electric.env for additional manual overrides.
# =============================================================================

env: []

# Additional environment variables (non-secret)
extraEnv:
  - name: RUST_LOG
    value: "info"
  - name: SERVER_LISTEN_ADDR
    value: "0.0.0.0:8081"

# =============================================================================
# Relay Tunnel Configuration (Optional)
# =============================================================================

relay:
  enabled: false
  replicaCount: 1

  image:
    repository: ghcr.io/iamriajul/vibe-kanban-team-relay
    pullPolicy: IfNotPresent
    tag: ""  # Defaults to chart appVersion

  service:
    type: ClusterIP
    port: 8082

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []

  # Also expose relay API/proxy paths under the main remote ingress host.
  # This keeps the remote frontend image reusable across environments because
  # it can fall back to the remote API base URL at runtime.
  proxyUnderRemoteIngress:
    enabled: true
    paths:
      - path: /v1/relay
        pathType: Prefix
      - path: /relay/h
        pathType: Prefix

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  # REQUIRED for relay:
  # - SERVER_DATABASE_URL (same database as remote server)
  # - VIBEKANBAN_REMOTE_JWT_SECRET (same JWT secret as remote server)
  env: []

  extraEnv:
    - name: RUST_LOG
      value: "info"
    - name: RELAY_LISTEN_ADDR
      value: "0.0.0.0:8082"

# =============================================================================
# ElectricSQL Configuration
# =============================================================================

# =============================================================================
# Frontend Configuration (Optional)
# =============================================================================
# Deploys the Vibe Kanban Frontend in a sysbox container with code-server.
# Uses systemd as PID 1 for full dev-environment capabilities.
# Requires: sysbox-runc RuntimeClass installed on the cluster.

frontend:
  enabled: false

  image:
    repository: iamriajul/coder-sysbox-systemd-docker-universal
    tag: "15"
    pullPolicy: IfNotPresent

  # RuntimeClass for sysbox (enables systemd, Docker-in-Docker)
  runtimeClassName: sysbox-runc

  # ===========================================================================
  # WireGuard VPN enforcement (optional)
  # ===========================================================================
  # Forces ALL outbound traffic from the frontend pod through a WireGuard tunnel.
  # Inbound (K8s ingress → code-server/frontend) is unaffected.
  #
  # When enabled, ALL values below are REQUIRED (helm will error if missing).
  # Pass sensitive values via --set or a secrets file (not checked into git).
  #
  # Traffic rules:
  #   - All outbound → wg0 (VPN tunnel)
  #   - WireGuard handshake UDP → eth0 (to reach VPN endpoint)
  #   - Inbound to ports 3000/8080 on eth0 → ACCEPT (ingress traffic)
  #   - RFC1918 (10/8, 172.16/12, 192.168/16) blocked on wg0 (no LAN access via VPN)
  #   - If VPN drops → all outbound blocked (kill switch)
  #   - DNS forced through VPN (default: 1.1.1.1 via wg0)
  #
  # Example deploy:
  #   helm upgrade --install ... -f values-production-hetzner.yaml \
  #     --set-file frontend.vpn.privateKey=/path/to/wg-private.key \
  #     --set frontend.vpn.peerPublicKey='Xf2a...' \
  #     --set frontend.vpn.endpoint='vpn.community.example.com' \
  #     --set frontend.vpn.address='10.66.66.2/32'
  vpn:
    enabled: false
    secretName: "vibe-kanban-vpn"
    # WireGuard client private key (required when enabled)
    privateKey: ""
    # VPN server's public key (required when enabled)
    peerPublicKey: ""
    # VPN server public endpoint — hostname or IP (required when enabled)
    endpoint: ""
    # VPN server port (default: 51820)
    endpointPort: "51820"
    # IP address assigned to this client by VPN server in CIDR (required when enabled)
    address: ""
    # WireGuard preshared key (optional)
    presharedKey: ""
    # DNS server to use through VPN (default: 1.1.1.1)
    dns: ""

  # ===========================================================================
  # Docker registry cache (optional)
  # ===========================================================================
  # Configures the in-pod Docker daemon to use a cluster-local registry mirror
  # (e.g., Zot pull-through proxy). Default URL matches the Zot deployment
  # from community-infra/coder-k8s.
  dockerCache:
    enabled: false
    registryMirrorUrl: "http://zot.zot.svc.cluster.local:5000"

  # Persistent Docker data (/var/lib/docker) on a separate PVC.
  # Always created when frontend is enabled — Docker layers, images, and build
  # cache survive pod restarts regardless of whether dockerCache is enabled.
  dockerPersistence:
    storageClass: ""
    size: 50Gi
    accessModes:
      - ReadWriteOnce

  # code-server configuration
  # Set enabled=false to deploy the frontend without code-server ingress.
  codeServer:
    enabled: true
    port: 13337
    # Proxy domain for exposing internal ports via code-server.
    # code-server extracts the port from the hostname and proxies to localhost:<port>.
    # Also auto-sets VSCODE_PROXY_URI for the VS Code Ports panel.
    # Example: "{{port}}-code.<global.domain>"
    proxyDomain: ""

  # Frontend application
  # Uses high port to avoid conflicts with dev apps (3000 is common)
  app:
    port: 13500
    # Command to start the frontend (run as coder user via systemd)
    command: "npx --yes vibe-kanban-team"
    # Working directory for the frontend process
    workingDirectory: "/home/coder"
    # Shared API base URL for the remote server
    # The frontend uses this to connect to the backend
    sharedApiBase: ""
    # Keep authentication credentials scoped to each browser session (default).
    # Set false to share a single credential file across browsers and survive
    # sign-outs/sign-ins across sessions on this deployment.
    browserScopedAuth: true
    # Sets VIBE_KANBAN_BYPASS_ONBOARDING=true for the app service.
    # You can also inject it through frontend.env/extraEnv.
    bypassOnboarding: false

  service:
    type: ClusterIP

  # Frontend app ingress. Defaults to global.domain.
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []

  # Code-server ingress (includes wildcard for port proxying).
  # Defaults to code.<global.domain> and *.<global.domain>.
  codeServerIngress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []

  # Persistent home directory for the coder user
  persistence:
    enabled: true
    storageClass: ""
    size: 10Gi
    accessModes:
      - ReadWriteOnce

  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi

  # Claude Code configuration
  # The chart creates a K8s secret (vibe-kanban-claude-code) with a placeholder.
  # Set the token here, via the secrets overlay, or edit the secret in Lens later.
  # Restart the frontend deployment after updating for it to take effect.
  claudeCode:
    oauthToken: ""

  # ZAI/OpenCode configuration
  # When set, the installer automatically installs OpenCode and configures auth.
  # The API key is used for the zai-coding-plan provider.
  zai:
    apiKey: ""

  # Additional environment variables for frontend container
  env: []
  extraEnv: []

  # ===========================================================================
  # Ingress-layer authentication (oauth2-proxy) — for public deployments
  # ===========================================================================
  # TWO SCENARIOS:
  #
  # Private/local network (DNS → local IP):
  #   auth.enabled: false   ← default; VK's built-in auth is sufficient.
  #   code-server ingress is unauthenticated — the network boundary is the guard.
  #
  # Public internet (DNS → public IP):
  #   auth.enabled: true    ← oauth2-proxy gates all frontend services.
  #   code-server has no auth of its own; ingress auth is required.
  #
  # Prerequisites (when enabled=true):
  #   kubectl create secret generic <secretName> \
  #     --from-literal=client-id='...' \
  #     --from-literal=client-secret='...' \
  #     --from-literal=cookie-secret="$(openssl rand -base64 32 | head -c 32)"
  #
  # Google OAuth app: https://console.cloud.google.com/apis/credentials
  #   Authorized redirect URI: https://<auth.host>/oauth2/callback
  # GitHub OAuth app: https://github.com/settings/developers
  #   Authorization callback URL: https://<auth.host>/oauth2/callback
  # Zoho OIDC: https://api-console.zoho.com
  #   Redirect URI: https://<auth.host>/oauth2/callback
  #   Set provider: oidc, oidcIssuerUrl: https://accounts.zoho.com
  auth:
    enabled: false

    # OAuth provider: google | github | oidc
    # Use "oidc" for Zoho, Keycloak, Auth0, or any OIDC-compliant provider.
    provider: google

    # OIDC configuration (required when provider=oidc)
    oidcIssuerUrl: ""  # e.g. https://accounts.zoho.com

    # Extra args passed directly to oauth2-proxy (for advanced/provider-specific flags)
    # Example for Zoho OIDC:
    #   extraArgs:
    #     - --scope=openid email profile
    #     - --insecure-oidc-allow-unverified-email=true
    extraArgs: []

    # -------------------------------------------------------------------------
    # Access restrictions — at least one required when enabled=true
    # -------------------------------------------------------------------------
    # emailDomains: restrict by email domain.
    #   Google examples:
    #     ["*"]                   → any Google account (personal Gmail + Workspace)
    #     ["gmail.com"]           → personal Gmail only
    #     ["mycompany.com"]       → Google Workspace org (or any @mycompany.com)
    #     ["a.com", "b.com"]     → multiple domains
    #   GitHub: not used — use githubOrg / githubTeam instead.
    emailDomains: []

    # allowedEmails: allowlist specific addresses regardless of domain (any provider).
    #   Example: ["alice@gmail.com", "bob@mycompany.com"]
    #   Combined with emailDomains using OR logic — either match grants access.
    allowedEmails: []

    # GitHub-specific: restrict to org or team members (provider: github only)
    githubOrg: ""    # e.g. "myorg"
    githubTeam: ""   # e.g. "myorg/backend-team"

    # Hostname for the OAuth2 proxy callback endpoint (auth.<global.domain> if blank)
    host: ""
    # Cookie domain covering all protected subdomains (derived from global.domain if blank)
    cookieDomain: ""

    # Name of the K8s secret with keys: client-id, client-secret
    # (cookie-secret is auto-generated by the chart)
    secretName: ""

    # Extra/override annotations added to protected ingresses.
    # For nginx, auth-url/auth-signin/auth-response-headers are derived
    # automatically when global.ingressClassName contains nginx.
    # For Traefik, router.middlewares is derived when createTraefikMiddleware=true
    # and global.ingressClassName contains traefik.
    protectedIngressAnnotations: {}

    # Set to true on Traefik clusters to create a Traefik Middleware CRD for forwardAuth.
    createTraefikMiddleware: false

    image:
      repository: quay.io/oauth2-proxy/oauth2-proxy
      tag: "v7.7.1"
      pullPolicy: IfNotPresent

    ingress:
      className: ""
      annotations: {}
      tls: []

    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 32Mi

  # Pod-level overrides
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# =============================================================================
# ElectricSQL Configuration
# =============================================================================

electric:
  enabled: true

  image:
    repository: electricsql/electric
    tag: "1.3.3"
    pullPolicy: IfNotPresent

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  service:
    type: ClusterIP
    port: 3000

  # ElectricSQL environment variables
  # The DATABASE_URL will be constructed from the same secret as the server
  env: []

  # Additional ElectricSQL environment variables
  extraEnv:
    - name: AUTH_MODE
      value: "insecure"
    - name: ELECTRIC_INSECURE
      value: "true"
    - name: ELECTRIC_MANUAL_TABLE_PUBLISHING
      value: "true"
    - name: ELECTRIC_USAGE_REPORTING
      value: "false"
    - name: ELECTRIC_FEATURE_FLAGS
      value: "allow_subqueries,tagged_subqueries"
